<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Müracaat Takip</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --bg:#EEF1EC;
  --surface:#FFFFFF;
  --ink:#16302B;
  --ink-soft:#54655F;
  --line:#DDE3DD;
  --teal:#2E7D6B;
  --teal-soft:#E3F0EB;
  --amber:#BE7A3B;
  --amber-soft:#F5E9DC;
  --indigo:#4C5C9C;
  --indigo-soft:#E6E8F3;
  --rust:#B5502F;
  --rust-soft:#F5E1D9;
  --green:#3E8E5A;
  --green-soft:#E1F0E6;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;}
.mono{font-family:'IBM Plex Mono',monospace;}
h1,h2,h3,.disp{font-family:'Fraunces',serif;}

/* ---------- HEADER ---------- */
header{
  background:var(--ink);
  color:#fff;
  padding:22px 32px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  flex-wrap:wrap;
}
header .brand{display:flex;align-items:center;gap:14px;}
header .brand svg{width:38px;height:38px;flex:none;}
header h1{margin:0;font-size:22px;font-weight:600;letter-spacing:.2px;}
header p{margin:2px 0 0;font-size:12.5px;color:#B9C9C2;}
.newbtn{
  background:var(--teal);
  color:#fff;
  border:none;
  padding:11px 20px;
  border-radius:8px;
  font-family:'Inter';
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  display:flex;align-items:center;gap:8px;
  transition:transform .15s ease, background .15s ease;
}
.newbtn:hover{background:#256456;transform:translateY(-1px);}

/* ---------- BOARD ---------- */
.board{
  padding:26px 32px 60px;
  display:grid;
  grid-template-columns:repeat(5,minmax(0,1fr));
  gap:16px;
  align-items:start;
}
@media(max-width:1200px){.board{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){.board{grid-template-columns:1fr;padding:18px;}}

.col{background:transparent;}
.col-head{
  display:flex;align-items:center;gap:8px;
  padding:0 4px 12px;
}
.col-dot{width:9px;height:9px;border-radius:50%;flex:none;}
.col-head h3{margin:0;font-size:13.5px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--ink-soft);}
.col-count{
  margin-left:auto;font-family:'IBM Plex Mono';font-size:12px;
  background:var(--surface);border:1px solid var(--line);
  padding:1px 8px;border-radius:20px;color:var(--ink-soft);
}
.col-body{display:flex;flex-direction:column;gap:10px;min-height:40px;}
.empty-col{
  border:1.5px dashed var(--line);border-radius:10px;
  padding:18px 10px;text-align:center;color:#9AA79F;font-size:12.5px;
}

/* ---------- CARD ---------- */
.card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:10px;
  padding:14px 14px 12px;
  cursor:pointer;
  position:relative;
  box-shadow:0 1px 2px rgba(22,48,43,.04);
  transition:box-shadow .15s ease, transform .15s ease;
}
.card:hover{box-shadow:0 6px 16px rgba(22,48,43,.10);transform:translateY(-1px);}
.card .stamp{
  position:absolute;top:12px;right:12px;
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono';font-weight:600;font-size:12px;
  color:#fff;
}
.card .no{font-family:'IBM Plex Mono';font-size:11px;color:var(--ink-soft);}
.card .name{font-family:'Fraunces';font-size:16.5px;margin:4px 0 6px;padding-right:30px;line-height:1.25;}
.card .addr{font-size:12.5px;color:var(--ink-soft);margin-bottom:8px;line-height:1.4;}
.card .tags{display:flex;gap:6px;flex-wrap:wrap;}
.badge{
  font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;
  display:inline-flex;align-items:center;gap:4px;
}

/* ---------- MODAL ---------- */
.overlay{
  position:fixed;inset:0;background:rgba(22,48,43,.45);
  display:none;align-items:center;justify-content:center;z-index:50;
  padding:24px;backdrop-filter:blur(2px);
}
.overlay.open{display:flex;}
.modal{
  background:var(--surface);
  width:100%;max-width:920px;max-height:88vh;
  border-radius:14px;overflow:hidden;
  display:grid;grid-template-columns:230px 1fr;
  box-shadow:0 24px 60px rgba(0,0,0,.28);
}
@media(max-width:760px){.modal{grid-template-columns:1fr;max-height:92vh;}}

/* rail */
.rail{
  background:var(--ink);color:#fff;
  padding:24px 20px;display:flex;flex-direction:column;
  overflow-y:auto;
}
.rail-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;}
.rail .no{font-family:'IBM Plex Mono';font-size:12px;color:#9FCABD;}
.rail .close{
  background:none;border:none;color:#B9C9C2;font-size:20px;cursor:pointer;line-height:1;padding:2px;
}
.rail .close:hover{color:#fff;}
.pipe{position:relative;padding-left:26px;}
.pipe::before{
  content:'';position:absolute;left:9px;top:6px;bottom:6px;width:2px;
  background:rgba(255,255,255,.18);
}
.pipe-fill{position:absolute;left:9px;top:6px;width:2px;background:var(--teal);transition:height .4s ease;}
.stage-item{position:relative;padding:0 0 26px;cursor:pointer;}
.stage-item:last-child{padding-bottom:0;}
.stage-dot{
  position:absolute;left:-26px;top:0;width:20px;height:20px;border-radius:50%;
  background:#2A4841;border:2px solid rgba(255,255,255,.25);
  display:flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono';font-size:10px;font-weight:600;color:#B9C9C2;
  transition:all .2s ease;
}
.stage-item.done .stage-dot{background:var(--teal);border-color:var(--teal);color:#fff;}
.stage-item.active .stage-dot{background:#fff;border-color:#fff;color:var(--ink);}
.stage-item .lbl{font-size:13.5px;font-weight:600;color:#B9C9C2;}
.stage-item.done .lbl,.stage-item.active .lbl{color:#fff;}
.stage-item .sub{font-size:11.5px;color:#8AA69C;margin-top:2px;line-height:1.4;}

/* panel */
.panel{overflow-y:auto;padding:26px 30px 30px;}
.panel h2{margin:0 0 2px;font-size:20px;}
.panel .meta{font-size:12.5px;color:var(--ink-soft);margin-bottom:22px;}
.section{
  border:1px solid var(--line);border-radius:10px;margin-bottom:14px;overflow:hidden;
}
.sec-head{
  padding:13px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;
  background:#FAFBF9;
}
.sec-head .idx{
  width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono';font-size:11px;font-weight:600;color:#fff;flex:none;
}
.sec-head .t{font-weight:600;font-size:14px;flex:1;}
.sec-head .stat{font-size:11.5px;color:var(--ink-soft);}
.sec-head .chev{transition:transform .2s ease;color:var(--ink-soft);}
.sec-body{padding:16px 18px 18px;border-top:1px solid var(--line);display:none;}
.section.open .sec-body{display:block;}
.section.open .chev{transform:rotate(180deg);}

.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px;}
.field input[type=text],.field input[type=number],.field select{
  width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:7px;
  font-family:'Inter';font-size:14px;background:#fff;color:var(--ink);
}
.field input:focus,.field select:focus{outline:2px solid var(--teal);outline-offset:0;border-color:var(--teal);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
@media(max-width:520px){.row2,.row3{grid-template-columns:1fr;}}

.choice-grp{display:flex;gap:8px;flex-wrap:wrap;}
.choice{
  border:1.5px solid var(--line);border-radius:7px;padding:9px 14px;font-size:13.5px;font-weight:500;
  cursor:pointer;background:#fff;user-select:none;transition:all .12s ease;
}
.choice:hover{border-color:var(--teal);}
.choice.sel{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:600;}

.readrow{display:flex;justify-content:space-between;gap:10px;font-size:13.5px;padding:6px 0;border-bottom:1px dashed var(--line);}
.readrow:last-child{border-bottom:none;}
.readrow .k{color:var(--ink-soft);}
.readrow .v{font-weight:600;text-align:right;}

.checklist{display:flex;flex-direction:column;gap:10px;}
.chk{
  display:flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:8px;padding:12px 14px;
  cursor:pointer;background:#fff;
}
.chk.on{background:var(--green-soft);border-color:var(--green);}
.chk .box{
  width:19px;height:19px;border-radius:5px;border:2px solid var(--line);flex:none;
  display:flex;align-items:center;justify-content:center;
}
.chk.on .box{background:var(--green);border-color:var(--green);}
.chk .box svg{display:none;width:12px;height:12px;stroke:#fff;}
.chk.on .box svg{display:block;}
.chk .lbl{font-size:13.5px;font-weight:500;}

.primary-btn{
  background:var(--teal);color:#fff;border:none;padding:11px 18px;border-radius:7px;
  font-weight:600;font-size:13.5px;cursor:pointer;margin-top:4px;
}
.primary-btn:disabled{background:#B7C4BF;cursor:not-allowed;}
.primary-btn:not(:disabled):hover{background:#256456;}
.help{font-size:12px;color:#9AA79F;margin-top:6px;}
.done-banner{
  display:flex;align-items:center;gap:8px;font-size:13px;color:var(--green);font-weight:600;
  background:var(--green-soft);padding:9px 12px;border-radius:7px;margin-top:6px;
}
.locked-note{font-size:12.5px;color:#9AA79F;font-style:italic;}

.completed-strip{
  margin-top:18px;padding:16px;border-radius:10px;background:var(--green-soft);
  border:1px solid #BFE0CB;text-align:center;
}
.completed-strip .disp{font-size:16px;color:var(--green);margin:0 0 2px;}
.completed-strip p{margin:0;font-size:12.5px;color:#3E6E52;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <svg viewBox="0 0 48 48" fill="none"><path d="M24 4C24 4 10 20 10 30a14 14 0 0028 0C38 20 24 4 24 4z" fill="#2E7D6B"/><path d="M24 4C24 4 10 20 10 30a14 14 0 0028 0C38 20 24 4 24 4z" stroke="#9FCABD" stroke-width="1.5"/><circle cx="24" cy="31" r="6" fill="#16302B" opacity=".35"/></svg>
    <div>
      <h1>Su &amp; Kanal Bağlantı Müracaat Takip</h1>
      <p>Ortak iş akışı panosu — tüm birimler aynı ekrandan işlem yapar</p>
    </div>
  </div>
  <button class="newbtn" onclick="createBasvuru()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Yeni Müracaat
  </button>
</header>

<div class="board" id="board"></div>

<div class="overlay" id="overlay" onmousedown="handleOverlayClick(event)">
  <div class="modal" id="modal" onmousedown="event.stopPropagation()"></div>
</div>

<script>
/* ================= CONFIG ================= */
const NITELIKLER = ["Su bağlantısı","Kanal bağlantısı","Su ve Kanal bağlantısı"];
const STAGE_META = [
  {key:1,label:"Müracaat",color:"teal"},
  {key:2,label:"Keşif",color:"amber"},
  {key:3,label:"İşlem",color:"indigo"},
  {key:4,label:"Yapım",color:"rust"},
];
const COL_DEFS = [
  {stage:1,label:"Müracaat",color:"teal"},
  {stage:2,label:"Keşif",color:"amber"},
  {stage:3,label:"İşlem",color:"indigo"},
  {stage:4,label:"Yapım",color:"rust"},
  {stage:5,label:"Tamamlandı",color:"green"},
];
const STORAGE_KEY = "basvurular-all";

let DATA = [];       // array of başvuru objects
let openId = null;   // currently open modal record id
let openSections = {1:false,2:false,3:false,4:false};
let modalOpenedAt = 0;

function handleOverlayClick(event){
  if(event.target !== event.currentTarget) return; // only backdrop itself
  if(Date.now() - modalOpenedAt < 350) return;      // ignore ghost-clicks right after opening
  closeModal();
}

const needsSu = n => n === "Su bağlantısı" || n === "Su ve Kanal bağlantısı";
const needsKanal = n => n === "Kanal bağlantısı" || n === "Su ve Kanal bağlantısı";
const uid = () => 'B' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2,5).toUpperCase();
const fmtDate = (ts) => ts ? new Date(ts).toLocaleString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';

function blank(){
  return {
    id: uid(), createdAt: Date.now(),
    adSoyad:"", mahalle:"", caddeSokak:"", kapiNo:"", nitelik:"", muracaatNo:"",
    asama1Tamam:false, asama1Tarih:null,
    suDurum:null, suMesafe:"", kanalDurum:null, kanalMesafe:"", etut:null,
    asama2Tamam:false, asama2Tarih:null,
    izinDurumu:null, sevkEdildi:false,
    asama3Tamam:false, asama3Tarih:null,
    yapim:{}, tamamlandi:false, tamamlandiTarih:null
  };
}

/* ================= STORAGE ================= */
async function loadData(){
  try{
    const res = await window.storage.get(STORAGE_KEY, true);
    DATA = res && res.value ? JSON.parse(res.value) : [];
  }catch(e){ DATA = []; }
}
async function saveData(){
  try{ await window.storage.set(STORAGE_KEY, JSON.stringify(DATA), true); }
  catch(e){ console.error('Kayıt hatası', e); }
}

/* ================= STAGE LOGIC ================= */
function currentStage(b){
  if(!b.asama1Tamam) return 1;
  if(!b.asama2Tamam) return 2;
  if(!b.asama3Tamam) return 3;
  if(!b.tamamlandi) return 4;
  return 5;
}
function requiredEtut(b){
  const suYok = needsSu(b.nitelik) && b.suDurum === 'yok';
  const kanalYok = needsKanal(b.nitelik) && b.kanalDurum === 'yok';
  return suYok || kanalYok;
}
function asama2Ready(b){
  if(needsSu(b.nitelik)){
    if(!b.suDurum) return false;
    if(b.suDurum==='yok' && !b.suMesafe) return false;
  }
  if(needsKanal(b.nitelik)){
    if(!b.kanalDurum) return false;
    if(b.kanalDurum==='yok' && !b.kanalMesafe) return false;
  }
  if(requiredEtut(b) && !b.etut) return false;
  return true;
}
function yapimSteps(b){
  const steps = [];
  if(needsSu(b.nitelik) && b.suDurum==='yok') steps.push({key:'suSebeke',label:'Su Şebekesi Yapıldı'});
  if(needsKanal(b.nitelik) && b.kanalDurum==='yok') steps.push({key:'kanalSebeke',label:'Kanal Şebekesi Yapıldı'});
  steps.push({key:'abone',label:'Abone Şube Yolu Yapıldı'});
  steps.push({key:'parsel',label:'Parsel Bağlantısı Yapıldı'});
  const finalLabel = b.nitelik === 'Su ve Kanal bağlantısı' ? 'Su ve Kanal Bağlantısı Yapıldı' : (b.nitelik + ' Yapıldı');
  steps.push({key:'baglanti',label: finalLabel[0].toUpperCase()+finalLabel.slice(1)});
  return steps;
}
function suText(b){
  if(b.suDurum==='var') return 'Su şebekesi var';
  if(b.suDurum==='yok') return `Su şebekesi ${b.suMesafe || '?'} metre mesafede`;
  return null;
}
function kanalText(b){
  if(b.kanalDurum==='var') return 'Kanal şebekesi var';
  if(b.kanalDurum==='yok') return `Kanal şebekesi ${b.kanalMesafe || '?'} metre mesafede`;
  return null;
}
function izinLabel(v){
  return {musaade:'Müsaadesi Alındı', proje_bekleniyor:'Projesi Bekleniyor', proje_hazir:'Projesi Hazır'}[v] || '';
}

/* ================= BOARD RENDER ================= */
function stageBadgeSvg(colorVar){ return colorVar; }

function render(){
  const board = document.getElementById('board');
  board.innerHTML = '';
  COL_DEFS.forEach(col=>{
    const items = DATA.filter(b => currentStage(b) === col.stage)
                       .sort((a,b)=> b.createdAt - a.createdAt);
    const colEl = document.createElement('div');
    colEl.className = 'col';
    colEl.innerHTML = `
      <div class="col-head">
        <span class="col-dot" style="background:var(--${col.color})"></span>
        <h3>${col.label}</h3>
        <span class="col-count">${items.length}</span>
      </div>
      <div class="col-body" id="colbody-${col.stage}"></div>
    `;
    board.appendChild(colEl);
    const body = colEl.querySelector('.col-body');
    if(items.length === 0){
      body.innerHTML = `<div class="empty-col">Kayıt yok</div>`;
      return;
    }
    items.forEach(b=>{
      body.appendChild(renderCard(b));
    });
  });
}

function renderCard(b){
  const stage = currentStage(b);
  const meta = COL_DEFS.find(c=>c.stage===stage);
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = ()=>openModal(b.id);
  const addr = [b.mahalle,b.caddeSokak,b.kapiNo].filter(Boolean).join(', ') || '— adres girilmedi —';
  card.innerHTML = `
    <div class="stamp" style="background:var(--${meta.color})">${stage<5?stage:'✓'}</div>
    <div class="no">${b.muracaatNo ? '№ '+esc(b.muracaatNo) : 'Müracaat No bekleniyor'}</div>
    <div class="name">${esc(b.adSoyad) || 'Ad Soyad girilmedi'}</div>
    <div class="addr">${esc(addr)}</div>
    <div class="tags">
      ${b.nitelik ? `<span class="badge" style="background:var(--teal-soft);color:var(--teal)">${esc(b.nitelik)}</span>` : ''}
      <span class="badge" style="background:var(--${meta.color}-soft, #eee);color:var(--${meta.color})">${meta.label}</span>
    </div>
  `;
  return card;
}

function esc(s){ return (s||'').toString().replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ================= CREATE ================= */
async function createBasvuru(){
  const b = blank();
  DATA.push(b);
  await saveData();
  render();
  openModal(b.id);
}

/* ================= MODAL ================= */
function openModal(id){
  openId = id;
  modalOpenedAt = Date.now();
  const b = DATA.find(x=>x.id===id);
  const stage = currentStage(b);
  openSections = {1:false,2:false,3:false,4:false};
  openSections[Math.min(stage,4)] = true;
  document.getElementById('overlay').classList.add('open');
  renderModal();
}
function closeModal(){
  openId = null;
  document.getElementById('overlay').classList.remove('open');
}
function toggleSection(idx){
  openSections[idx] = !openSections[idx];
  renderModal();
}

function renderModal(){
  const b = DATA.find(x=>x.id===openId);
  if(!b) return;
  const stage = currentStage(b);
  const modal = document.getElementById('modal');

  // rail
  let railHtml = `
    <div class="rail-top">
      <div>
        <div class="no">${b.muracaatNo ? '№ '+esc(b.muracaatNo) : 'TASLAK'}</div>
      </div>
      <button class="close" onclick="closeModal()">✕</button>
    </div>
    <div class="pipe">
      <div class="pipe-fill" style="height:${Math.max(0,(Math.min(stage,4)-1))*calcStep()}px"></div>
  `;
  STAGE_META.forEach(s=>{
    const doneFlag = s.key < stage;
    const activeFlag = s.key === stage;
    railHtml += `
      <div class="stage-item ${doneFlag?'done':''} ${activeFlag?'active':''}" onclick="toggleSection(${s.key})">
        <div class="stage-dot">${doneFlag ? '✓' : s.key}</div>
        <div class="lbl">${s.label}</div>
        <div class="sub">${stageSub(b,s.key)}</div>
      </div>
    `;
  });
  railHtml += `</div>`;
  if(b.tamamlandi){
    railHtml += `<div style="margin-top:auto;padding-top:20px;font-size:12px;color:#8AA69C;">Tamamlandı<br>${fmtDate(b.tamamlandiTarih)}</div>`;
  }

  // panel
  let panelHtml = `
    <h2 class="disp">${esc(b.adSoyad) || 'Yeni Müracaat'}</h2>
    <div class="meta">Oluşturuldu: ${fmtDate(b.createdAt)}${b.muracaatNo ? ' · № '+esc(b.muracaatNo) : ''}</div>
    ${section1(b)}
    ${section2(b)}
    ${section3(b)}
    ${section4(b)}
    ${b.tamamlandi ? `<div class="completed-strip"><p class="disp">Süreç tamamlandı</p><p>${fmtDate(b.tamamlandiTarih)} tarihinde tüm yapım işlemleri kapatıldı.</p></div>` : ''}
  `;

  modal.innerHTML = `<div class="rail">${railHtml}</div><div class="panel">${panelHtml}</div>`;
}
function calcStep(){ return 62; } // approx spacing between stage dots for fill height

function stageSub(b, key){
  if(key===1) return b.asama1Tamam ? esc(b.nitelik) : (b.asama1Tamam===false && currentStage(b)===1 ? 'Bilgiler giriliyor' : '');
  if(key===2){
    if(!b.asama1Tamam) return 'Müracaat bekleniyor';
    if(b.asama2Tamam) return [suText(b),kanalText(b)].filter(Boolean).join(' · ');
    return 'Keşif bekleniyor';
  }
  if(key===3){
    if(!b.asama2Tamam) return 'Keşif bekleniyor';
    if(b.asama3Tamam) return izinLabel(b.izinDurumu);
    return 'İşlem bekleniyor';
  }
  if(key===4){
    if(!b.asama3Tamam) return 'Sevk bekleniyor';
    if(b.tamamlandi) return 'Tamamlandı';
    return 'Yapım sürüyor';
  }
  return '';
}

/* ---- Section 1: Müracaat ---- */
function section1(b){
  const complete = b.asama1Tamam;
  const open = openSections[1];
  const filled = b.adSoyad && b.mahalle && b.caddeSokak && b.kapiNo && b.nitelik && b.muracaatNo;
  return `
  <div class="section ${open?'open':''}">
    <div class="sec-head" onclick="toggleSection(1)">
      <div class="idx" style="background:var(--teal)">${complete?'✓':'1'}</div>
      <div class="t">Müracaat</div>
      <div class="stat">${complete ? fmtDate(b.asama1Tarih) : 'Devam ediyor'}</div>
      <div class="chev">▾</div>
    </div>
    <div class="sec-body">
      ${complete ? `
        <div class="readrow"><span class="k">Ad Soyad</span><span class="v">${esc(b.adSoyad)}</span></div>
        <div class="readrow"><span class="k">Adres</span><span class="v">${esc(b.mahalle)}, ${esc(b.caddeSokak)} No:${esc(b.kapiNo)}</span></div>
        <div class="readrow"><span class="k">Müracaat Niteliği</span><span class="v">${esc(b.nitelik)}</span></div>
        <div class="readrow"><span class="k">Müracaat No</span><span class="v mono">${esc(b.muracaatNo)}</span></div>
        <p class="locked-note">Kayıt tamamlandı. Düzeltme gerekiyorsa alanlar üzerinden güncelleyip tekrar kaydedebilirsiniz.</p>
        <details style="margin-top:8px;"><summary style="cursor:pointer;font-size:12.5px;color:var(--teal);font-weight:600;">Bilgileri düzenle</summary>
          <div style="margin-top:12px;">${section1Fields(b)}</div>
        </details>
      ` : section1Fields(b)}
    </div>
  </div>`;
}
function section1Fields(b){
  return `
    <div class="field"><label>Ad Soyad</label>
      <input type="text" value="${esc(b.adSoyad)}" oninput="updateField('${b.id}','adSoyad',this.value)" placeholder="Müracaat eden kişi">
    </div>
    <div class="row3">
      <div class="field"><label>Mahalle</label>
        <input type="text" value="${esc(b.mahalle)}" oninput="updateField('${b.id}','mahalle',this.value)"></div>
      <div class="field"><label>Cadde / Sokak</label>
        <input type="text" value="${esc(b.caddeSokak)}" oninput="updateField('${b.id}','caddeSokak',this.value)"></div>
      <div class="field"><label>Kapı No</label>
        <input type="text" value="${esc(b.kapiNo)}" oninput="updateField('${b.id}','kapiNo',this.value)"></div>
    </div>
    <div class="field"><label>Müracaatın Niteliği</label>
      <div class="choice-grp">
        ${NITELIKLER.map(n=>`<div class="choice ${b.nitelik===n?'sel':''}" onclick="updateField('${b.id}','nitelik','${n}')">${n}</div>`).join('')}
      </div>
    </div>
    <div class="field"><label>Müracaat No</label>
      <input type="text" value="${esc(b.muracaatNo)}" oninput="updateField('${b.id}','muracaatNo',this.value)" placeholder="Evrak / müracaat numarası">
    </div>
    <button class="primary-btn" ${(!b.adSoyad||!b.mahalle||!b.caddeSokak||!b.kapiNo||!b.nitelik||!b.muracaatNo)?'disabled':''} onclick="completeStage1('${b.id}')">Keşife Gönder</button>
    <p class="help">Tüm alanlar doldurulduğunda kayıt keşif birimine düşer.</p>
  `;
}

/* ---- Section 2: Keşif ---- */
function section2(b){
  const locked = !b.asama1Tamam;
  const complete = b.asama2Tamam;
  const open = openSections[2];
  return `
  <div class="section ${open?'open':''}">
    <div class="sec-head" onclick="${locked?'':'toggleSection(2)'}" style="${locked?'opacity:.5;cursor:default;':''}">
      <div class="idx" style="background:var(--amber)">${complete?'✓':'2'}</div>
      <div class="t">Keşif</div>
      <div class="stat">${locked?'Bekliyor':(complete ? fmtDate(b.asama2Tarih) : 'Devam ediyor')}</div>
      <div class="chev">▾</div>
    </div>
    ${locked ? '' : `<div class="sec-body">
      ${complete ? `
        ${suText(b) ? `<div class="readrow"><span class="k">Su Şebekesi</span><span class="v">${suText(b)}</span></div>`:''}
        ${kanalText(b) ? `<div class="readrow"><span class="k">Kanal Şebekesi</span><span class="v">${kanalText(b)}</span></div>`:''}
        ${b.etut ? `<div class="readrow"><span class="k">Etüt</span><span class="v">${b.etut==='yapildi'?'Etüt yapıldı':'Etüt yapılmadı'}</span></div>`:''}
        <details style="margin-top:8px;"><summary style="cursor:pointer;font-size:12.5px;color:var(--amber);font-weight:600;">Keşif bilgilerini düzenle</summary>
          <div style="margin-top:12px;">${section2Fields(b)}</div>
        </details>
      ` : section2Fields(b)}
    </div>`}
  </div>`;
}
function section2Fields(b){
  let html = '';
  if(needsSu(b.nitelik)){
    html += `
    <div class="field"><label>Su Şebekesi</label>
      <div class="choice-grp">
        <div class="choice ${b.suDurum==='var'?'sel':''}" onclick="updateField('${b.id}','suDurum','var')">Var</div>
        <div class="choice ${b.suDurum==='yok'?'sel':''}" onclick="updateField('${b.id}','suDurum','yok')">Yok</div>
      </div>
    </div>`;
    if(b.suDurum==='yok'){
      html += `<div class="field"><label>Mesafe (metre)</label>
        <input type="number" min="0" value="${esc(b.suMesafe)}" oninput="updateField('${b.id}','suMesafe',this.value)" placeholder="örn. 45"></div>`;
    }
  }
  if(needsKanal(b.nitelik)){
    html += `
    <div class="field"><label>Kanal Şebekesi</label>
      <div class="choice-grp">
        <div class="choice ${b.kanalDurum==='var'?'sel':''}" onclick="updateField('${b.id}','kanalDurum','var')">Var</div>
        <div class="choice ${b.kanalDurum==='yok'?'sel':''}" onclick="updateField('${b.id}','kanalDurum','yok')">Yok</div>
      </div>
    </div>`;
    if(b.kanalDurum==='yok'){
      html += `<div class="field"><label>Mesafe (metre)</label>
        <input type="number" min="0" value="${esc(b.kanalMesafe)}" oninput="updateField('${b.id}','kanalMesafe',this.value)" placeholder="örn. 30"></div>`;
    }
  }
  if(requiredEtut(b)){
    html += `
    <div class="field"><label>Etüt</label>
      <div class="choice-grp">
        <div class="choice ${b.etut==='yapildi'?'sel':''}" onclick="updateField('${b.id}','etut','yapildi')">Etüt yapıldı</div>
        <div class="choice ${b.etut==='yapilmadi'?'sel':''}" onclick="updateField('${b.id}','etut','yapilmadi')">Etüt yapılmadı</div>
      </div>
    </div>`;
  }
  html += `<button class="primary-btn" ${asama2Ready(b)?'':'disabled'} onclick="completeStage2('${b.id}')">İşlem Personeline Gönder</button>
    <p class="help">Şebeke durumu (ve gerekiyorsa etüt sonucu) girildikten sonra kayıt işlem personeline döner.</p>`;
  return html;
}

/* ---- Section 3: İşlem ---- */
function section3(b){
  const locked = !b.asama2Tamam;
  const complete = b.asama3Tamam;
  const open = openSections[3];
  return `
  <div class="section ${open?'open':''}">
    <div class="sec-head" onclick="${locked?'':'toggleSection(3)'}" style="${locked?'opacity:.5;cursor:default;':''}">
      <div class="idx" style="background:var(--indigo)">${complete?'✓':'3'}</div>
      <div class="t">İşlem</div>
      <div class="stat">${locked?'Bekliyor':(complete ? fmtDate(b.asama3Tarih) : 'Devam ediyor')}</div>
      <div class="chev">▾</div>
    </div>
    ${locked ? '' : `<div class="sec-body">
      ${complete ? `
        <div class="readrow"><span class="k">Durum</span><span class="v">${izinLabel(b.izinDurumu)}</span></div>
        <div class="readrow"><span class="k">Sevk</span><span class="v">Yapım Birimine Sevk Edildi</span></div>
      ` : `
        <div class="field"><label>Durum</label>
          <div class="choice-grp">
            <div class="choice ${b.izinDurumu==='musaade'?'sel':''}" onclick="updateField('${b.id}','izinDurumu','musaade')">Müsaadesi Alındı</div>
            <div class="choice ${b.izinDurumu==='proje_bekleniyor'?'sel':''}" onclick="updateField('${b.id}','izinDurumu','proje_bekleniyor')">Projesi Bekleniyor</div>
            <div class="choice ${b.izinDurumu==='proje_hazir'?'sel':''}" onclick="updateField('${b.id}','izinDurumu','proje_hazir')">Projesi Hazır</div>
          </div>
        </div>
        <button class="primary-btn" ${b.izinDurumu?'':'disabled'} onclick="completeStage3('${b.id}')">Kaydet ve Yapım Birimine Sevk Et</button>
        <p class="help">Kayıt onaylandığında otomatik olarak "Yapım Birimine Sevk Edildi" olarak işaretlenir.</p>
      `}
    </div>`}
  </div>`;
}

/* ---- Section 4: Yapım ---- */
function section4(b){
  const locked = !b.asama3Tamam;
  const complete = b.tamamlandi;
  const open = openSections[4];
  const steps = locked ? [] : yapimSteps(b);
  return `
  <div class="section ${open?'open':''}">
    <div class="sec-head" onclick="${locked?'':'toggleSection(4)'}" style="${locked?'opacity:.5;cursor:default;':''}">
      <div class="idx" style="background:var(--rust)">${complete?'✓':'4'}</div>
      <div class="t">Yapım</div>
      <div class="stat">${locked?'Bekliyor':(complete ? fmtDate(b.tamamlandiTarih) : 'Devam ediyor')}</div>
      <div class="chev">▾</div>
    </div>
    ${locked ? '' : `<div class="sec-body">
      <div class="checklist">
        ${steps.map(s=>`
          <div class="chk ${b.yapim[s.key]?'on':''}" onclick="toggleYapim('${b.id}','${s.key}')">
            <div class="box"><svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
            <div class="lbl">${s.label}</div>
          </div>
        `).join('')}
      </div>
      ${complete ? `<div class="done-banner">✓ Tüm yapım işlemleri tamamlandı</div>` : `<p class="help">Tüm maddeler işaretlendiğinde süreç otomatik olarak kapatılır.</p>`}
    </div>`}
  </div>`;
}

/* ================= ACTIONS ================= */
async function updateField(id, field, value){
  const b = DATA.find(x=>x.id===id);
  if(!b) return;
  b[field] = value;
  // reset dependent fields when relevant choices change
  if(field==='nitelik'){ b.suDurum=null;b.suMesafe='';b.kanalDurum=null;b.kanalMesafe='';b.etut=null; }
  if(field==='suDurum' && value==='var'){ b.suMesafe=''; }
  if(field==='kanalDurum' && value==='var'){ b.kanalMesafe=''; }
  await saveData();
  renderModal();
  render();
}
async function completeStage1(id){
  const b = DATA.find(x=>x.id===id);
  b.asama1Tamam = true; b.asama1Tarih = Date.now();
  openSections={1:false,2:true,3:false,4:false};
  await saveData(); renderModal(); render();
}
async function completeStage2(id){
  const b = DATA.find(x=>x.id===id);
  if(!asama2Ready(b)) return;
  b.asama2Tamam = true; b.asama2Tarih = Date.now();
  openSections={1:false,2:false,3:true,4:false};
  await saveData(); renderModal(); render();
}
async function completeStage3(id){
  const b = DATA.find(x=>x.id===id);
  if(!b.izinDurumu) return;
  b.sevkEdildi = true; b.asama3Tamam = true; b.asama3Tarih = Date.now();
  openSections={1:false,2:false,3:false,4:true};
  await saveData(); renderModal(); render();
}
async function toggleYapim(id, key){
  const b = DATA.find(x=>x.id===id);
  b.yapim[key] = !b.yapim[key];
  const steps = yapimSteps(b);
  const allDone = steps.every(s=>b.yapim[s.key]);
  if(allDone && !b.tamamlandi){ b.tamamlandi = true; b.tamamlandiTarih = Date.now(); }
  if(!allDone && b.tamamlandi){ b.tamamlandi = false; b.tamamlandiTarih = null; }
  await saveData(); renderModal(); render();
}

/* ================= INIT ================= */
async function init(){
  await loadData();
  render();
  // periodic sync so multiple personnel see each other's updates
  setInterval(async ()=>{
    const wasOpen = openId;
    const currentRecord = wasOpen ? DATA.find(x=>x.id===wasOpen) : null;
    await loadData();
    render();
    if(!wasOpen) return;
    const stillThere = DATA.find(x=>x.id===wasOpen);
    if(stillThere){
      renderModal();
    }else if(currentRecord){
      // not yet visible in shared storage (propagation delay) — keep showing local copy
      DATA.push(currentRecord);
    }
  }, 4000);
}
init();
</script>
