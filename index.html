<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Müracaat Takip</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3E58D7">
<link rel="icon" type="image/png" sizes="32x32" href="https://raw.githubusercontent.com/talhaadr-collab/muracaat-takip/main/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="https://raw.githubusercontent.com/talhaadr-collab/muracaat-takip/main/favicon-16.png">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/talhaadr-collab/muracaat-takip/main/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Müracaat Takip">
<meta name="mobile-web-app-capable" content="yes">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --bg:#EEF1EC;
  --surface:#FFFFFF;
  --ink:#16302B;
  --ink-soft:#54655F;
  --line:#DDE3DD;
  --teal:#2E7D6B;
  --teal-soft:#E3F0EB;
  --amber:#BE7A3B;
  --amber-soft:#F5E9DC;
  --indigo:#4C5C9C;
  --indigo-soft:#E6E8F3;
  --rust:#B5502F;
  --rust-soft:#F5E1D9;
  --green:#3E8E5A;
  --green-soft:#E1F0E6;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;}
.mono{font-family:'IBM Plex Mono',monospace;}
h1,h2,h3,.disp{font-family:'Fraunces',serif;}

/* ---------- HEADER ---------- */
header{
  background:var(--ink);
  color:#fff;
  padding:22px 32px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  flex-wrap:wrap;
}
header .brand{display:flex;align-items:center;gap:14px;}
header .brand-logo{height:44px;width:auto;flex:none;}
header h1{margin:0;font-size:22px;font-weight:600;letter-spacing:.2px;}
header p{margin:2px 0 0;font-size:12.5px;color:#B9C9C2;}
.newbtn{
  background:var(--teal);
  color:#fff;
  border:none;
  padding:11px 20px;
  border-radius:8px;
  font-family:'Inter';
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  display:flex;align-items:center;gap:8px;
  transition:transform .15s ease, background .15s ease;
}
.newbtn:hover{background:#256456;transform:translateY(-1px);}

.badge{
  font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;
  display:inline-flex;align-items:center;gap:4px;
}

/* ---------- MODAL ---------- */
.overlay{
  position:fixed;inset:0;background:rgba(22,48,43,.45);
  display:none;align-items:center;justify-content:center;z-index:50;
  padding:24px;backdrop-filter:blur(2px);
}
.overlay.open{display:flex;}
.modal{
  background:var(--surface);
  width:100%;max-width:920px;
  height:88vh;
  max-height:88vh;
  border-radius:14px;overflow:hidden;
  display:grid;grid-template-columns:230px 1fr;
  box-shadow:0 24px 60px rgba(0,0,0,.28);
}
@media(max-width:760px){.modal{grid-template-columns:1fr;height:92vh;max-height:92vh;}}

/* rail */
.rail{
  background:var(--ink);color:#fff;
  padding:24px 20px;display:flex;flex-direction:column;
  overflow-y:auto;
}
.rail-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;}
.rail .no{font-family:'IBM Plex Mono';font-size:12px;color:#9FCABD;}
.rail .close{
  background:none;border:none;color:#B9C9C2;font-size:20px;cursor:pointer;line-height:1;padding:2px;
}
.rail .close:hover{color:#fff;}
.rail .close[title="Kaydı Sil"]:hover{color:#E5806A;}
.pipe{position:relative;padding-left:26px;}
.pipe::before{
  content:'';position:absolute;left:9px;top:6px;bottom:6px;width:2px;
  background:rgba(255,255,255,.18);
}
.pipe-fill{position:absolute;left:9px;top:6px;width:2px;background:var(--teal);transition:height .4s ease;}
.stage-item{position:relative;padding:0 0 26px;cursor:pointer;}
.stage-item:last-child{padding-bottom:0;}
.stage-dot{
  position:absolute;left:-26px;top:0;width:20px;height:20px;border-radius:50%;
  background:#2A4841;border:2px solid rgba(255,255,255,.25);
  display:flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono';font-size:10px;font-weight:600;color:#B9C9C2;
  transition:all .2s ease;
}
.stage-item.done .stage-dot{background:var(--teal);border-color:var(--teal);color:#fff;}
.stage-item.active .stage-dot{background:#fff;border-color:#fff;color:var(--ink);}
.stage-item .lbl{font-size:13.5px;font-weight:600;color:#B9C9C2;}
.stage-item.done .lbl,.stage-item.active .lbl{color:#fff;}
.stage-item .sub{font-size:11.5px;color:#8AA69C;margin-top:2px;line-height:1.4;}

/* panel - Scrollbar */
.panel{
  overflow-y:auto;
  padding:26px 30px 30px;
  height:100%;
}
.panel::-webkit-scrollbar { width: 8px; }
.panel::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
.panel::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
.panel::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

.panel h2{margin:0 0 2px;font-size:20px;}
.panel .meta{font-size:12.5px;color:var(--ink-soft);margin-bottom:22px;}
.section{
  border:1px solid var(--line);border-radius:10px;margin-bottom:14px;overflow:hidden;
}
.sec-head{
  padding:13px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;
  background:#FAFBF9;
}
.sec-head .idx{
  width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono';font-size:11px;font-weight:600;color:#fff;flex:none;
}
.sec-head .t{font-weight:600;font-size:14px;flex:1;}
.sec-head .stat{font-size:11.5px;color:var(--ink-soft);}
.sec-head .chev{transition:transform .2s ease;color:var(--ink-soft);}
.sec-body{padding:16px 18px 18px;border-top:1px solid var(--line);display:none;}
.section.open .sec-body{display:block;}
.section.open .chev{transform:rotate(180deg);}

.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px;}
.field input[type=text],.field input[type=number],.field select{
  width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:7px;
  font-family:'Inter';font-size:14px;background:#fff;color:var(--ink);
}
.field input:focus,.field select:focus{outline:2px solid var(--teal);outline-offset:0;border-color:var(--teal);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
@media(max-width:520px){.row2,.row3{grid-template-columns:1fr;}}

.choice-grp{display:flex;gap:8px;flex-wrap:wrap;}
.choice{
  border:1.5px solid var(--line);border-radius:7px;padding:9px 14px;font-size:13.5px;font-weight:500;
  cursor:pointer;background:#fff;user-select:none;transition:all .12s ease;
}
.choice:hover{border-color:var(--teal);}
.choice.sel{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:600;}

.readrow{display:flex;justify-content:space-between;gap:10px;font-size:13.5px;padding:6px 0;border-bottom:1px dashed var(--line);}
.readrow:last-child{border-bottom:none;}
.readrow .k{color:var(--ink-soft);}
.readrow .v{font-weight:600;text-align:right;}

.checklist{display:flex;flex-direction:column;gap:10px;}
.chk{
  display:flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:8px;padding:12px 14px;
  cursor:pointer;background:#fff;
}
.chk.on{background:var(--green-soft);border-color:var(--green);}
.chk .box{
  width:19px;height:19px;border-radius:5px;border:2px solid var(--line);flex:none;
  display:flex;align-items:center;justify-content:center;
}
.chk.on .box{background:var(--green);border-color:var(--green);}
.chk .box svg{display:none;width:12px;height:12px;stroke:#fff;}
.chk.on .box svg{display:block;}
.chk .lbl{font-size:13.5px;font-weight:500;}

.primary-btn{
  background:var(--teal);color:#fff;border:none;padding:11px 18px;border-radius:7px;
  font-weight:600;font-size:13.5px;cursor:pointer;margin-top:4px;
}
.primary-btn:disabled{background:#B7C4BF;cursor:not-allowed;}
.primary-btn:not(:disabled):hover{background:#256456;}
.help{font-size:12px;color:#9AA79F;margin-top:6px;}
.done-banner{
  display:flex;align-items:center;gap:8px;font-size:13px;color:var(--green);font-weight:600;
  background:var(--green-soft);padding:9px 12px;border-radius:7px;margin-top:6px;
}
.locked-note{font-size:12.5px;color:#9AA79F;font-style:italic;}

.completed-strip{
  margin-top:18px;padding:16px;border-radius:10px;background:var(--green-soft);
  border:1px solid #BFE0CB;text-align:center;
}
.completed-strip .disp{font-size:16px;color:var(--green);margin:0 0 2px;}
.completed-strip p{margin:0;font-size:12.5px;color:#3E6E52;}

/* ---------- HEADER ACTIONS ---------- */
.header-actions{display:flex;gap:10px;align-items:center;}

/* ---------- REPORT VIEW ---------- */
.report-wrap{padding:26px 32px 60px;}
.report-filters{
  display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;
  background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:14px;
}
.report-filters input[type=text],.report-filters input[type=date],.report-filters select{
  padding:9px 12px;border:1px solid var(--line);border-radius:7px;font-family:'Inter';font-size:13.5px;background:#fff;color:var(--ink);
}
.report-filters input[type=text]{flex:1;min-width:180px;}
.rep-tbl{width:100%;border-collapse:collapse;background:var(--surface);border-radius:10px;overflow:hidden;border:1px solid var(--line);}
.rep-tbl th{
  text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.3px;color:var(--ink-soft);
  padding:12px 14px;background:#FAFBF9;border-bottom:1px solid var(--line);
}
.rep-tbl td{padding:12px 14px;font-size:13.5px;border-bottom:1px solid var(--line);}
.rep-tbl tbody tr{cursor:pointer;}
.rep-tbl tbody tr:hover{background:#FAFBF9;}
.rep-tbl tbody tr:last-child td{border-bottom:none;}
.rep-tbl tbody tr.row-done{background:var(--green-soft);}
.rep-tbl tbody tr.row-done:hover{background:#D7EEE0;}
.rep-tbl tbody tr.row-progress{background:var(--amber-soft);}
.rep-tbl tbody tr.row-progress:hover{background:#F0E0C8;}
.rep-count{font-size:12.5px;color:var(--ink-soft);margin-bottom:12px;}
.empty-col{
  border:1.5px dashed var(--line);border-radius:10px;
  padding:18px 10px;text-align:center;color:#9AA79F;font-size:12.5px;
}

@media(max-width:640px){
  .report-wrap{padding: 18px;}

  /* Turn the report table into stacked cards on narrow screens —
     no more horizontal scrollbar, everything fits one column, only
     vertical scrolling is needed. */
  .rep-tbl thead{display:none;}
  .rep-tbl, .rep-tbl tbody, .rep-tbl tr{display:block;width:100%;}
  .rep-tbl{border-collapse:separate;border:none;background:transparent;}
  .rep-tbl tbody tr{
    display:flex;flex-direction:column;gap:6px;
    background:var(--surface);border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;margin-bottom:10px;
  }
  .rep-tbl tbody tr.row-done{background:var(--green-soft);}
  .rep-tbl tbody tr.row-progress{background:var(--amber-soft);}
  .rep-tbl td{
    display:flex;flex-direction:column;gap:2px;
    padding:4px 0;border-bottom:none;font-size:13.5px;text-align:left;
  }
  .rep-tbl td::before{
    content:attr(data-label);
    font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;
    color:var(--ink-soft);
  }
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <img src="https://raw.githubusercontent.com/talhaadr-collab/muracaat-takip/main/header-logo.png" alt="KOSKİ" class="brand-logo">
    <div>
      <h1>10. Bölge Şube Müdürlüğü</h1>
      <p>Su &amp; Kanal Bağlantı Müracaat Takip</p>
    </div>
  </div>
  <div class="header-actions">
    <button class="newbtn" onclick="createBasvuru()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Yeni Müracaat
    </button>
  </div>
</header>

<div class="report-wrap" id="reportView">
  <div class="report-filters">
    <input type="text" id="rep-search" value="" placeholder="Ad soyad, mahalle veya müracaat no ara" oninput="updateReportFilter('search',this.value)">
    <select id="rep-stage" onchange="updateReportFilter('stage',this.value)">
      <option value="all">Tüm Aşamalar</option>
      <option value="1">Müracaat</option>
      <option value="2">Keşif</option>
      <option value="3">İşlem</option>
      <option value="4">Yapım</option>
      <option value="5">Tamamlandı</option>
    </select>
    <input type="date" id="rep-from" value="" onchange="updateReportFilter('from',this.value)" title="Başlangıç tarihi">
    <input type="date" id="rep-to" value="" onchange="updateReportFilter('to',this.value)" title="Bitiş tarihi">
  </div>
  <div id="rep-count" class="rep-count"></div>
  <div id="rep-table"></div>
</div>

<div class="overlay" id="overlay" onmousedown="handleOverlayClick(event)">
  <div class="modal" id="modal" onmousedown="event.stopPropagation()"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.15.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.15.0/firebase-firestore-compat.min.js"></script>

<script>
/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyCcT_S_n4Vh0HSG9yxoBEw-6EpkGSPMj3A",
  authDomain: "muracaat-takip.firebaseapp.com",
  projectId: "muracaat-takip",
  storageBucket: "muracaat-takip.firebasestorage.app",
  messagingSenderId: "892225377254",
  appId: "1:892225377254:web:256a460ae02be895febc27"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const basvurularRef = db.collection('basvurular');

/* ================= CONFIG ================= */
const NITELIKLER = ["Su bağlantısı","Kanal bağlantısı","Su ve Kanal bağlantısı"];
const STAGE_META = [
  {key:1,label:"Müracaat",color:"teal"},
  {key:2,label:"Keşif",color:"amber"},
  {key:3,label:"İşlem",color:"indigo"},
  {key:4,label:"Yapım",color:"rust"},
];
const COL_DEFS = [
  {stage:1,label:"Müracaat",color:"teal"},
  {stage:2,label:"Keşif",color:"amber"},
  {stage:3,label:"İşlem",color:"indigo"},
  {stage:4,label:"Yapım",color:"rust"},
  {stage:5,label:"Tamamlandı",color:"green"},
];

let DATA = [];
let openId = null;
let openSections = {1:false,2:false,3:false,4:false};
let modalOpenedAt = 0;
let saveTimer = null;
let pendingEditId = null;
let reportFilters = {search:'', stage:'all', from:'', to:''};

function handleOverlayClick(event){
  if(event.target !== event.currentTarget) return;
  if(Date.now() - modalOpenedAt < 350) return;
  closeModal();
}

function updateTextField(id, field, value){
  const b = DATA.find(x=>x.id===id);
  if(!b) return;
  b[field] = value;
  b.updatedAt = Date.now();
  pendingEditId = id;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    const rec = DATA.find(x=>x.id===id);
    if(rec) await pushRecord(rec);
    pendingEditId = null;
    render();
  }, 700);
  refreshButtons(id);
}

function refreshButtons(id){
  const b = DATA.find(x=>x.id===id);
  if(!b) return;
  const btn1 = document.getElementById('btn-stage1-'+id);
  if(btn1) btn1.disabled = !(b.adSoyad&&b.mahalle&&b.caddeSokak&&b.kapiNo&&b.nitelik&&b.muracaatNo);
  const btn2 = document.getElementById('btn-stage2-'+id);
  if(btn2) btn2.disabled = !asama2Ready(b);
  const btn4 = document.getElementById('btn-stage4-'+id);
  if(btn4){
    const steps = yapimSteps(b);
    btn4.disabled = !steps.some(s=>b.yapim[s.key]);
  }
}

const needsSu = n => n === "Su bağlantısı" || n === "Su ve Kanal bağlantısı";
const needsKanal = n => n === "Kanal bağlantısı" || n === "Su ve Kanal bağlantısı";
const uid = () => 'B' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2,5).toUpperCase();
const fmtDate = (ts) => ts ? new Date(ts).toLocaleString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';

function blank(){
  return {
    id: uid(), createdAt: Date.now(), updatedAt: Date.now(),
    adSoyad:"", mahalle:"", caddeSokak:"", kapiNo:"", nitelik:"", muracaatNo:"",
    asama1Tamam:false, asama1Tarih:null,
    suDurum:null, suMesafe:"", kanalDurum:null, kanalMesafe:"", etut:null,
    asama2Tamam:false, asama2Tarih:null,
    izinDurumu:null, sevkEdildi:false,
    asama3Tamam:false, asama3Tarih:null,
    yapim:{}, yapimTarih:{}, tamamlandi:false, tamamlandiTarih:null
  };
}

async function pushRecord(b){
  try{ await basvurularRef.doc(b.id).set(b); }
  catch(e){ console.error('Firestore yazma hatası', e); }
}

function currentStage(b){
  if(!b.asama1Tamam) return 1;
  if(!b.asama2Tamam) return 2;
  if(!b.asama3Tamam) return 3;
  if(!b.tamamlandi) return 4;
  return 5;
}
function requiredEtut(b){
  const suYok = needsSu(b.nitelik) && b.suDurum === 'yok';
  const kanalYok = needsKanal(b.nitelik) && b.kanalDurum === 'yok';
  return suYok || kanalYok;
}
function asama2Ready(b){
  if(needsSu(b.nitelik)){
    if(!b.suDurum) return false;
    if(b.suDurum==='yok' && !b.suMesafe) return false;
  }
  if(needsKanal(b.nitelik)){
    if(!b.kanalDurum) return false;
    if(b.kanalDurum==='yok' && !b.kanalMesafe) return false;
  }
  if(requiredEtut(b) && !b.etut) return false;
  return true;
}
function yapimSteps(b){
  const steps = [];
  if(needsSu(b.nitelik) && b.suDurum==='yok') steps.push({key:'suSebeke',label:'Su Şebekesi Yapıldı'});
  if(needsKanal(b.nitelik) && b.kanalDurum==='yok') steps.push({key:'kanalSebeke',label:'Kanal Şebekesi Yapıldı'});
  steps.push({key:'abone',label:'Abone Şube Yolu Yapıldı'});
  steps.push({key:'parsel',label:'Parsel Bağlantısı Yapıldı'});
  if(b.nitelik) {
    const finalLabel = b.nitelik === 'Su ve Kanal bağlantısı' ? 'Su ve Kanal Bağlantısı Yapıldı' : (b.nitelik + ' Yapıldı');
    steps.push({key:'baglanti',label: finalLabel[0].toUpperCase()+finalLabel.slice(1)});
  }
  return steps;
}
function suText(b){
  if(b.suDurum==='var') return 'Su şebekesi var';
  if(b.suDurum==='yok') return `Su şebekesi ${b.suMesafe || '?'} metre mesafede`;
  return null;
}
function kanalText(b){
  if(b.kanalDurum==='var') return 'Kanal şebekesi var';
  if(b.kanalDurum==='yok') return `Kanal şebekesi ${b.kanalMesafe || '?'} metre mesafede`;
  return null;
}
function izinLabel(v){
  return {musaade:'Müsaadesi Alındı', proje_bekleniyor:'Projesi Bekleniyor', proje_hazir:'Projesi Hazır'}[v] || '';
}

function render(){
  renderReportTable();
}

function esc(s){ return (s||'').toString().replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function createBasvuru(){
  const b = blank();
  DATA.push(b);
  render();
  openModal(b.id);
  await pushRecord(b);
}

function openModal(id){
  openId = id;
  modalOpenedAt = Date.now();
  const b = DATA.find(x=>x.id===id);
  const stage = currentStage(b);
  openSections = {1:false,2:false,3:false,4:false};
  openSections[Math.min(stage,4)] = true;
  document.getElementById('overlay').classList.add('open');
  renderModal();
}
function isBlank(b){
  return !b.adSoyad && !b.mahalle && !b.caddeSokak && !b.kapiNo && !b.nitelik && !b.muracaatNo;
}
async function deleteBasvuru(id){
  const b = DATA.find(x=>x.id===id);
  const label = b && b.adSoyad ? `"${b.adSoyad}" kaydını` : 'bu kaydı';
  if(!confirm(`${label} kalıcı olarak silmek istediğinize emin misiniz? Bu işlem geri alınamaz.`)) return;
  const idx = DATA.findIndex(x=>x.id===id);
  if(idx>=0) DATA.splice(idx,1);
  if(openId === id){ openId = null; document.getElementById('overlay').classList.remove('open'); }
  render();
  try{ await basvurularRef.doc(id).delete(); }
  catch(e){ console.error('Kayıt silinemedi', e); }
}
async function closeModal(){
  const id = openId;
  const b = DATA.find(x=>x.id===id);
  openId = null;
  document.getElementById('overlay').classList.remove('open');
  // if the user opened "Yeni Müracaat" and closed it without entering anything,
  // don't leave a permanent empty record behind
  if(b && !b.asama1Tamam && isBlank(b)){
    const idx = DATA.findIndex(x=>x.id===id);
    if(idx>=0) DATA.splice(idx,1);
    render();
    try{ await basvurularRef.doc(id).delete(); }
    catch(e){ console.error('Boş kayıt silinemedi', e); }
  }
}
function toggleSection(idx){
  openSections[idx] = !openSections[idx];
  renderModal();
}

function renderModal(){
  const b = DATA.find(x=>x.id===openId);
  if(!b) return;
  const stage = currentStage(b);
  const modal = document.getElementById('modal');

  let railHtml = `
    <div class="rail-top">
      <div>
        <div class="no">${b.muracaatNo ? '№ '+esc(b.muracaatNo) : 'TASLAK'}</div>
      </div>
      <div style="display:flex;gap:6px;">
        <button class="close" title="Kaydı Sil" onclick="deleteBasvuru('${b.id}')">🗑</button>
        <button class="close" onclick="closeModal()">✕</button>
      </div>
    </div>
    <div class="pipe">
      <div class="pipe-fill" style="height:${Math.max(0,(Math.min(stage,4)-1))*calcStep()}px"></div>
  `;
  STAGE_META.forEach(s=>{
    const doneFlag = s.key < stage;
    const activeFlag = s.key === stage;
    railHtml += `
      <div class="stage-item ${doneFlag?'done':''} ${activeFlag?'active':''}" onclick="toggleSection(${s.key})">
        <div class="stage-dot">${doneFlag ? '✓' : s.key}</div>
        <div class="lbl">${s.label}</div>
        <div class="sub">${stageSub(b,s.key)}</div>
      </div>
    `;
  });
  railHtml += `</div>`;
  if(b.tamamlandi){
    railHtml += `<div style="margin-top:auto;padding-top:20px;font-size:12px;color:#8AA69C;">Tamamlandı<br>${fmtDate(b.tamamlandiTarih)}</div>`;
  }

  let panelHtml = `
    <h2 class="disp">${esc(b.adSoyad) || 'Yeni Müracaat'}</h2>
    <div class="meta">Oluşturuldu: ${fmtDate(b.createdAt)}${b.muracaatNo ? ' · № '+esc(b.muracaatNo) : ''}</div>
    ${section1(b)}
    ${section2(b)}
    ${section3(b)}
    ${section4(b)}
    ${b.tamamlandi ? `<div class="completed-strip"><p class="disp">Süreç tamamlandı</p><p>${fmtDate(b.tamamlandiTarih)} tarihinde süreç kapatıldı.</p></div>` : ''}
  `;

  modal.innerHTML = `<div class="rail">${railHtml}</div><div class="panel">${panelHtml}</div>`;
}

function calcStep(){ return 62; }

function stageSub(b, key){
  if(key===1) return b.asama1Tamam ? esc(b.nitelik) : (b.asama1Tamam===false && currentStage(b)===1 ? 'Bilgiler giriliyor' : '');
  if(key===2){
    if(!b.asama1Tamam) return 'Müracaat bekleniyor';
    if(b.asama2Tamam) return [suText(b),kanalText(b)].filter(Boolean).join(' · ');
    return 'Keşif bekleniyor';
  }
  if(key===3){
    if(!b.asama2Tamam) return 'Keşif bekleniyor';
    if(b.asama3Tamam) return izinLabel(b.izinDurumu);
    return 'İşlem bekleniyor';
  }
  if(key===4){
    if(!b.asama3Tamam) return 'Sevk bekleniyor';
    if(b.tamamlandi) return 'Tamamlandı';
    return 'Yapım sürüyor';
  }
  return '';
}

function section1(b){
  const complete = b.asama1Tamam;
  const open = openSections[1];
  return `
  <div class="section ${open?'open':''}">
    <div class="sec-head" onclick="toggleSection(1)">
      <div class="idx" style="background:var(--teal)">${complete?'✓':'1'}</div>
      <div class="t">Müracaat</div>
      <div class="stat">${complete ? fmtDate(b.asama1Tarih) : 'Devam ediyor'}</div>
      <div class="chev">▾</div>
    </div>
    <div class="sec-body">
      ${complete ? `
        <div class="readrow"><span class="k">Ad Soyad</span><span class="v">${esc(b.adSoyad)}</span></div>
        <div class="readrow"><span class="k">Adres</span><span class="v">${esc(b.mahalle)}, ${esc(b.caddeSokak)} No:${esc(b.kapiNo)}</span></div>
        <div class="readrow"><span class="k">Müracaat Niteliği</span><span class="v">${esc(b.nitelik)}</span></div>
        <div class="readrow"><span class="k">Müracaat No</span><span class="v mono">${esc(b.muracaatNo)}</span></div>
        <p class="locked-note">Kayıt tamamlandı. Düzeltme gerekiyorsa alanlar üzerinden güncelleyip tekrar kaydedebilirsiniz.</p>
        <details style="margin-top:8px;"><summary style="cursor:pointer;font-size:12.5px;color:var(--teal);font-weight:600;">Bilgileri düzenle</summary>
          <div style="margin-top:12px;">${section1Fields(b)}</div>
        </details>
      ` : section1Fields(b)}
    </div>
  </div>`;
}

function section1Fields(b){
  return `
    <div class="field"><label>Ad Soyad</label>
      <input type="text" value="${esc(b.adSoyad)}" oninput="updateTextField('${b.id}','adSoyad',this.value)" placeholder="Müracaat eden kişi">
    </div>
    <div class="row3">
      <div class="field"><label>Mahalle</label>
        <input type="text" value="${esc(b.mahalle)}" oninput="updateTextField('${b.id}','mahalle',this.value)"></div>
      <div class="field"><label>Cadde / Sokak</label>
        <input type="text" value="${esc(b.caddeSokak)}" oninput="updateTextField('${b.id}','caddeSokak',this.value)"></div>
      <div class="field"><label>Kapı No</label>
        <input type="text" value="${esc(b.kapiNo)}" oninput="updateTextField('${b.id}','kapiNo',this.value)"></div>
    </div>
    <div class="field"><label>Müracaatın Niteliği</label>
      <div class="choice-grp">
        ${NITELIKLER.map(n=>`<div class="choice ${b.nitelik===n?'sel':''}" onclick="updateField('${b.id}','nitelik','${n}')">${n}</div>`).join('')}
      </div>
    </div>
    <div class="field"><label>Müracaat No</label>
      <input type="text" value="${esc(b.muracaatNo)}" oninput="updateTextField('${b.id}','muracaatNo',this.value)" placeholder="Evrak / müracaat numarası">
    </div>
    <button class="primary-btn" id="btn-stage1-${b.id}" ${(!b.adSoyad||!b.mahalle||!b.caddeSokak||!b.kapiNo||!b.nitelik||!b.muracaatNo)?'disabled':''} onclick="completeStage1('${b.id}')">Onayla ve Keşife Gönder</button>
    <p class="help">Tüm alanlar doldurulup onaylandığında kayıt keşif birimine düşer ve bu bölüm kapanır.</p>
  `;
}

function section2(b){
  const locked = !b.asama1Tamam;
  const complete = b.asama2Tamam;
  const open = openSections[2];
  return `
  <div class="section ${open?'open':''}">
    <div class="sec-head" onclick="${locked?'':'toggleSection(2)'}" style="${locked?'opacity:.5;cursor:default;':''}">
      <div class="idx" style="background:var(--amber)">${complete?'✓':'2'}</div>
      <div class="t">Keşif</div>
      <div class="stat">${locked?'Bekliyor':(complete ? fmtDate(b.asama2Tarih) : 'Devam ediyor')}</div>
      <div class="chev">▾</div>
    </div>
    ${locked ? '' : `<div class="sec-body">
      ${complete ? `
        ${suText(b) ? `<div class="readrow"><span class="k">Su Şebekesi</span><span class="v">${suText(b)}</span></div>`:''}
        ${kanalText(b) ? `<div class="readrow"><span class="k">Kanal Şebekesi</span><span class="v">${kanalText(b)}</span></div>`:''}
        ${b.etut ? `<div class="readrow"><span class="k">Etüt</span><span class="v">${b.etut==='yapildi'?'Etüt yapıldı':'Etüt yapılmadı'}</span></div>`:''}
        <details style="margin-top:8px;"><summary style="cursor:pointer;font-size:12.5px;color:var(--amber);font-weight:600;">Keşif bilgilerini düzenle</summary>
          <div style="margin-top:12px;">${section2Fields(b)}</div>
        </details>
      ` : section2Fields(b)}
    </div>`}
  </div>`;
}

function section2Fields(b){
  let html = '';
  if(needsSu(b.nitelik)){
    html += `
    <div class="field"><label>Su Şebekesi</label>
      <div class="choice-grp">
        <div class="choice ${b.suDurum==='var'?'sel':''}" onclick="updateField('${b.id}','suDurum','var')">Var</div>
        <div class="choice ${b.suDurum==='yok'?'sel':''}" onclick="updateField('${b.id}','suDurum','yok')">Yok</div>
      </div>
    </div>`;
    if(b.suDurum==='yok'){
      html += `<div class="field"><label>Mesafe (metre)</label>
        <input type="number" min="0" value="${esc(b.suMesafe)}" oninput="updateTextField('${b.id}','suMesafe',this.value)" placeholder="örn. 45"></div>`;
    }
  }
  if(needsKanal(b.nitelik)){
    html += `
    <div class="field"><label>Kanal Şebekesi</label>
      <div class="choice-grp">
        <div class="choice ${b.kanalDurum==='var'?'sel':''}" onclick="updateField('${b.id}','kanalDurum','var')">Var</div>
        <div class="choice ${b.kanalDurum==='yok'?'sel':''}" onclick="updateField('${b.id}','kanalDurum','yok')">Yok</div>
      </div>
    </div>`;
    if(b.kanalDurum==='yok'){
      html += `<div class="field"><label>Mesafe (metre)</label>
        <input type="number" min="0" value="${esc(b.kanalMesafe)}" oninput="updateTextField('${b.id}','kanalMesafe',this.value)" placeholder="örn. 30"></div>`;
    }
  }
  if(requiredEtut(b)){
    html += `
    <div class="field"><label>Etüt</label>
      <div class="choice-grp">
        <div class="choice ${b.etut==='yapildi'?'sel':''}" onclick="updateField('${b.id}','etut','yapildi')">Etüt yapıldı</div>
        <div class="choice ${b.etut==='yapilmadi'?'sel':''}" onclick="updateField('${b.id}','etut','yapilmadi')">Etüt yapılmadı</div>
      </div>
    </div>`;
  }
  html += `<button class="primary-btn" id="btn-stage2-${b.id}" ${asama2Ready(b)?'':'disabled'} onclick="completeStage2('${b.id}')">Onayla ve İşlem Personeline Gönder</button>
    <p class="help">Şebeke durumu (ve gerekiyorsa etüt sonucu) girilip onaylandığında bu bölüm kapanır, kayıt işlem personeline döner.</p>`;
  return html;
}

function section3(b){
  const locked = !b.asama2Tamam;
  const complete = b.asama3Tamam;
  const open = openSections[3];
  return `
  <div class="section ${open?'open':''}">
    <div class="sec-head" onclick="${locked?'':'toggleSection(3)'}" style="${locked?'opacity:.5;cursor:default;':''}">
      <div class="idx" style="background:var(--indigo)">${complete?'✓':'3'}</div>
      <div class="t">İşlem</div>
      <div class="stat">${locked?'Bekliyor':(complete ? fmtDate(b.asama3Tarih) : 'Devam ediyor')}</div>
      <div class="chev">▾</div>
    </div>
    ${locked ? '' : `<div class="sec-body">
      ${complete ? `
        <div class="readrow"><span class="k">Durum</span><span class="v">${izinLabel(b.izinDurumu)}</span></div>
        <div class="readrow"><span class="k">Sevk</span><span class="v">Yapım Birimine Sevk Edildi</span></div>
      ` : `
        <div class="field"><label>Durum</label>
          <div class="choice-grp">
            <div class="choice ${b.izinDurumu==='musaade'?'sel':''}" onclick="updateField('${b.id}','izinDurumu','musaade')">Müsaadesi Alındı</div>
            <div class="choice ${b.izinDurumu==='proje_bekleniyor'?'sel':''}" onclick="updateField('${b.id}','izinDurumu','proje_bekleniyor')">Projesi Bekleniyor</div>
            <div class="choice ${b.izinDurumu==='proje_hazir'?'sel':''}" onclick="updateField('${b.id}','izinDurumu','proje_hazir')">Projesi Hazır</div>
          </div>
        </div>
        <button class="primary-btn" ${b.izinDurumu === 'musaade' ? '' : 'disabled'} onclick="completeStage3('${b.id}')">Kaydet ve Yapım Birimine Sevk Et</button>
        <p class="help">Yalnızca "Müsaadesi Alındı" seçildiğinde yapım birimine sevk işlemi yapılabilir. Diğer durumlarda kayıt bekletilir.</p>
      `}
    </div>`}
  </div>`;
}

function section4(b){
  const locked = !b.asama3Tamam;
  const complete = b.tamamlandi;
  const open = openSections[4];
  const steps = locked ? [] : yapimSteps(b);
  return `
  <div class="section ${open?'open':''}">
    <div class="sec-head" onclick="${locked?'':'toggleSection(4)'}" style="${locked?'opacity:.5;cursor:default;':''}">
      <div class="idx" style="background:var(--rust)">${complete?'✓':'4'}</div>
      <div class="t">Yapım</div>
      <div class="stat">${locked?'Bekliyor':(complete ? fmtDate(b.tamamlandiTarih) : 'Devam ediyor')}</div>
      <div class="chev">▾</div>
    </div>
    ${locked ? '' : `<div class="sec-body">
      <div class="checklist">
        ${steps.map(s=>`
          <div class="chk ${b.yapim[s.key]?'on':''}" onclick="toggleYapim('${b.id}','${s.key}')">
            <div class="box"><svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
            <div style="flex:1;">
              <div class="lbl">${s.label}</div>
              ${b.yapim[s.key] && b.yapimTarih && b.yapimTarih[s.key] ? `<div class="help" style="margin-top:2px;">${fmtDate(b.yapimTarih[s.key])}</div>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
      ${complete ? `<div class="done-banner">✓ Süreç kapatıldı</div>` : `
        <button class="primary-btn" id="btn-stage4-${b.id}" ${steps.some(s=>b.yapim[s.key])?'':'disabled'} onclick="completeStage4('${b.id}')">Süreci Tamamla</button>
        <p class="help">En az bir yapım maddesi işaretlendiğinde süreç tamamlanabilir.</p>
      `}
    </div>`}
  </div>`;
}

function updateReportFilter(key, val){
  reportFilters[key] = val;
  renderReportTable();
}

function renderReportTable(){
  const tbl = document.getElementById('rep-table');
  if(!tbl) return;
  let rows = DATA.slice();
  if(reportFilters.search){
    const q = reportFilters.search.toLocaleLowerCase('tr');
    rows = rows.filter(b =>
      (b.adSoyad||'').toLocaleLowerCase('tr').includes(q) ||
      (b.muracaatNo||'').toLocaleLowerCase('tr').includes(q) ||
      (b.mahalle||'').toLocaleLowerCase('tr').includes(q) ||
      (b.caddeSokak||'').toLocaleLowerCase('tr').includes(q) ||
      (b.kapiNo||'').toLocaleLowerCase('tr').includes(q)
    );
  }
  if(reportFilters.stage !== 'all'){
    rows = rows.filter(b => currentStage(b) === Number(reportFilters.stage));
  }
  if(reportFilters.from){
    const fromTs = new Date(reportFilters.from).getTime();
    rows = rows.filter(b => b.createdAt >= fromTs);
  }
  if(reportFilters.to){
    const toTs = new Date(reportFilters.to).getTime() + 24*3600*1000 - 1;
    rows = rows.filter(b => b.createdAt <= toTs);
  }
  rows.sort((a,b)=> b.createdAt - a.createdAt);

  document.getElementById('rep-count').textContent = `${rows.length} kayıt listeleniyor`;

  if(rows.length === 0){
    tbl.innerHTML = `<div class="empty-col">Filtreyle eşleşen kayıt bulunamadı</div>`;
    return;
  }
  tbl.innerHTML = `
    <table class="rep-tbl">
      <thead><tr>
        <th>Müracaat No</th><th>Ad Soyad</th><th>Adres</th><th>Nitelik</th><th>Aşama</th><th>Kayıt Tarihi</th><th>Yapılan İşlemler</th>
      </tr></thead>
      <tbody>
        ${rows.map(b=>{
          const stage = currentStage(b);
          const meta = COL_DEFS.find(c=>c.stage===stage);
          const yapimAdimlari = yapimSteps(b).filter(s => b.yapim[s.key]).map(s => s.label).join(', ');
          const addr = [b.mahalle, b.caddeSokak, b.kapiNo].filter(Boolean).join(', ');
          
          return `<tr class="${stage===5?'row-done':'row-progress'}" onclick="openModal('${b.id}')">
            <td class="mono" data-label="Müracaat No">${esc(b.muracaatNo)||'—'}</td>
            <td data-label="Ad Soyad">${esc(b.adSoyad)||'—'}</td>
            <td data-label="Adres">${esc(addr)||'—'}</td>
            <td data-label="Nitelik">${esc(b.nitelik)||'—'}</td>
            <td data-label="Aşama"><span class="badge" style="background:var(--${meta.color}-soft);color:var(--${meta.color})">${meta.label}</span></td>
            <td data-label="Kayıt Tarihi">${fmtDate(b.createdAt)}</td>
            <td data-label="Yapılan İşlemler" style="color:#54655F; font-size:12.5px;">${yapimAdimlari ? esc(yapimAdimlari) : 'İşlem yok'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

async function updateField(id, field, value){
  const b = DATA.find(x=>x.id===id);
  if(!b) return;
  b[field] = value;
  b.updatedAt = Date.now();
  if(field==='nitelik'){ b.suDurum=null;b.suMesafe='';b.kanalDurum=null;b.kanalMesafe='';b.etut=null; }
  if(field==='suDurum' && value==='var'){ b.suMesafe=''; }
  if(field==='kanalDurum' && value==='var'){ b.kanalMesafe=''; }
  renderModal();
  render();
  await pushRecord(b);
}
async function completeStage1(id){
  const b = DATA.find(x=>x.id===id);
  b.asama1Tamam = true; b.asama1Tarih = Date.now(); b.updatedAt = Date.now();
  openSections={1:false,2:true,3:false,4:false};
  renderModal(); render();
  await pushRecord(b);
}
async function completeStage2(id){
  const b = DATA.find(x=>x.id===id);
  if(!asama2Ready(b)) return;
  b.asama2Tamam = true; b.asama2Tarih = Date.now(); b.updatedAt = Date.now();
  openSections={1:false,2:false,3:true,4:false};
  renderModal(); render();
  await pushRecord(b);
}
async function completeStage3(id){
  const b = DATA.find(x=>x.id===id);
  if(b.izinDurumu !== 'musaade') return; 
  b.sevkEdildi = true; b.asama3Tamam = true; b.asama3Tarih = Date.now(); b.updatedAt = Date.now();
  openSections={1:false,2:false,3:false,4:true};
  renderModal(); render();
  await pushRecord(b);
}
async function toggleYapim(id, key){
  const b = DATA.find(x=>x.id===id);
  if(!b.yapimTarih) b.yapimTarih = {};
  b.yapim[key] = !b.yapim[key];
  if(b.yapim[key]) b.yapimTarih[key] = Date.now();
  else delete b.yapimTarih[key];
  b.updatedAt = Date.now();
  if(b.tamamlandi){ b.tamamlandi = false; b.tamamlandiTarih = null; }
  renderModal(); render();
  await pushRecord(b);
}
async function completeStage4(id){
  const b = DATA.find(x=>x.id===id);
  const steps = yapimSteps(b);
  if(!steps.some(s=>b.yapim[s.key])) return;
  b.tamamlandi = true; b.tamamlandiTarih = Date.now(); b.updatedAt = Date.now();
  renderModal(); render();
  await pushRecord(b);
}

function init(){
  basvurularRef.onSnapshot(snapshot=>{
    snapshot.docChanges().forEach(change=>{
      const data = change.doc.data();
      const idx = DATA.findIndex(x=>x.id===data.id);
      if(change.type === 'removed'){
        if(idx>=0) DATA.splice(idx,1);
      }else if(idx>=0){
        DATA[idx] = data;
      }else{
        DATA.push(data);
      }
    });
    render();
    if(openId && DATA.find(x=>x.id===openId)){
      const activeEl = document.activeElement;
      const isTyping = activeEl && document.getElementById('modal').contains(activeEl) && activeEl.tagName === 'INPUT';
      if(!isTyping) renderModal();
    }
  }, err=>{
    console.error('Firestore dinleme hatası', err);
  });
}
init();

  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./service-worker.js')
      .catch(err=>console.error('Service worker kayıt hatası', err));
  });
}
